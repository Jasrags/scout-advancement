name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Only run release when CI passes
  ci-check:
    uses: ./.github/workflows/ci.yml

  release:
    name: Semantic Release
    needs: ci-check
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install semantic-release
        run: pip install python-semantic-release>=9.0

      - name: Run semantic-release
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          OUTPUT=$(semantic-release version --print 2>&1) || true
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            semantic-release version
            VERSION=$(python -c "from src.version import __version__; print(__version__)")
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: macos-app
            build-cmd: bash scripts/build.sh
            package-cmd: |
              cd dist
              zip -r "Scout-Advancement-Labels-${{ needs.release.outputs.version }}-macos.zip" "Scout Advancement Labels.app"
            artifact-pattern: dist/Scout-Advancement-Labels-*-macos.zip
          - os: windows-latest
            artifact-name: windows-exe
            build-cmd: pwsh scripts/build.ps1
            package-cmd: |
              Compress-Archive -Path "dist\Scout Advancement Labels" -DestinationPath "dist\Scout-Advancement-Labels-${{ needs.release.outputs.version }}-windows.zip"
            artifact-pattern: dist/Scout-Advancement-Labels-*-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: ${{ matrix.build-cmd }}

      - name: Package artifact
        run: ${{ matrix.package-cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-pattern }}

  publish-release:
    name: Publish GitHub Release
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-app
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-exe
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          pip install python-semantic-release>=9.0
          semantic-release changelog --post >> changelog_body.md 2>/dev/null || true
          if [ ! -s changelog_body.md ]; then
            echo "Release ${{ needs.release.outputs.tag }}" > changelog_body.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          # If a release already exists (e.g. from a prior failed run), update it
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/Scout-Advancement-Labels-*.zip --clobber
          else
            gh release create "$TAG" \
              dist/Scout-Advancement-Labels-*.zip \
              --title "Release $TAG" \
              --notes-file changelog_body.md \
              --latest
          fi
